name: Hidden Job Radar Scanner

permissions:
  contents: write

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Scan mode: local or remote"
        required: true
        default: "local"
        type: choice
        options:
          - local
          - remote
      location:
        description: "City/region for local scan, e.g. Dallas, Texas"
        required: false
        default: "Dallas, Texas"
      industry_terms:
        description: "Comma-separated business categories or remote keywords"
        required: false
        default: "plumbing,roofing,hvac,it services,marketing agency"

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run scanner
        env:
          SCAN_MODE: ${{ github.event.inputs.mode || 'local' }}
          SCAN_LOCATION: ${{ github.event.inputs.location || 'Dallas, Texas' }}
          INDUSTRY_TERMS: ${{ github.event.inputs.industry_terms || 'plumbing,roofing,hvac,it services,marketing agency' }}
        run: python scanner.py

      - name: Commit scanner results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/leads.json
          git commit -m "update leads" || echo "no changes"
          git push
